# Theme-only site config, read at build time by src/lib/settings.ts.
# NOTE: the Saastro Hub does NOT read or edit this file — it's the site's own
# build config (SEO, analytics, forms wiring). Editable content lives in i18n
# (src/i18n/translations/*), structural config in saastrocms.config.ts.

site:
  name: "TuMarca"
  # Google Search Console verification (leave empty to omit the meta tag).
  googleSiteVerificationId:
  favicon:
    colors:
      icon: "#00a897"
      theme: "#00a897"

metadata:
  # Fallback <meta description> when a page doesn't pass one. Per-page/per-locale
  # titles + descriptions come from the i18n `meta` namespace, not here.
  description: "Plantillas Astro rápidas con React + shadcn + Tailwind."

seo:
  # Site-wide JSON-LD (schema.org). A WebSite entity is always emitted; set
  # `schemaType` to also emit the primary entity for rich results.
  #   Person               -> personal site / portfolio (add jobTitle)
  #   Organization         -> company / product
  #   ProfessionalService  -> agency / studio
  # Leave empty to emit only the WebSite schema.
  schemaType: ""
  email: ""
  jobTitle: ""
  # Profiles / owned domains Google can cross-reference (one URL per line).
  sameAs: []

analytics:
  # Empty = disabled. GA/GTM are consent-gated; set a REAL id to enable.
  # Recommended for Saastro sites: use Cloudflare Web Analytics below instead.
  googleAnalytics:
    id: ""
  googleTagManager:
    id: ""
  cloudflareWebAnalytics:
    # CF Web Analytics beacon TOKEN (Hub → Audiencia gives you the site token).
    # This is the client-side beacon token — NOT the Hub's GraphQL "site tag".
    # Empty = disabled. Host-blocked in the Studio preview + local dev.
    token: ""

forms:
  # Saastro Hub form integration. `siteId` is the Hub site this template is
  # connected to (Hub → Setup shows it; copied by hand today). Leave empty until
  # connected — the contact form then shows a "configure me" placeholder instead
  # of erroring. `contactFormSlug` is the form the slide-out ContactSheet renders.
  siteId: ""
  contactFormSlug: "contact"

gen:
  # saastro-gen lead tracking. When `workspaceId` is set, an anonymous per-session
  # visitor id is minted and page views beacon to gen's /collect — so a lead that
  # later submits the form is attributed to its full pre-lead journey. The same id
  # rides to gen via a `gen_visitor_id` hidden form field (a `storage` resolver,
  # area=session). Consent-gated by the `analytics` cookie category. Empty =
  # disabled (no id minted, no beacon).
  workspaceId: ""
  vertical: "default"
  # gen's public collector endpoint (prod default).
  collectUrl: "https://gen.saastro.io/collect"
