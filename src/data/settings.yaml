site:
  name: "TuMarca"
  site: "https://tumarca.com"
  base: "/"
  trailingSlash: "never"
  googleSiteVerificationId:
  favicon:
    colors:
      icon: "#00a897"
      theme: "#00a897"

i18n:
  language: "es"
  textDirection: "ltr"

metadata:
  title:
    default: "TuMarca"
    template: "%s | TuMarca"
  description: "Plantillas Astro rápidas con React + shadcn + Tailwind."
  robots:
    index: true
    follow: true
  openGraph:
    type: "website"
    site_name: "TuMarca"
    images: []     # puedes poner una URL absoluta
  twitter:
    card: "summary_large_image"

apps:
  blog:
    isEnabled: false
    list:
      pathname: "blog"
      robots: { index: true, follow: true }
    category: { pathname: "category" }
    tag: { pathname: "tag" }
    post:
      permalink: "/blog/%slug%"
      robots: { index: true, follow: true }
    postsPerPage: 6
ui:
  theme: "system" # Values: "system" | "light" | "dark" | "light:only" | "dark:only"

analytics:
  # Empty = disabled. GA/GTM are consent-gated; set a REAL id to enable.
  # Recommended for Saastro sites: use Cloudflare Web Analytics below instead.
  googleAnalytics:
    id: ""
  googleTagManager:
    id: ""
  cloudflareWebAnalytics:
    # CF Web Analytics beacon token (Hub → Audiencia gives you the site TOKEN).
    # Empty = disabled. Host-blocked in the Studio preview + local dev.
    token: ""

forms:
  # Saastro Hub form integration. `siteId` is the Hub site slug this
  # template is connected to (Hub → Setup shows it). Leave empty until
  # connected — the contact form then shows a "configure me" placeholder
  # instead of erroring. `contactFormSlug` is the form designed in Hub
  # that the slide-out ContactSheet renders.
  siteId: ""
  contactFormSlug: "contact"

cookieConsent:
  privacyPolicyUrl: "/privacy"
  position: "bottom"  # Values: "bottom" | "top" | "center"
  theme: "auto"  # Values: "light" | "dark" | "auto"
