# pnpm 11 reads package-level settings from here (the `pnpm` field in
# package.json is no longer honored). Approve the native/postinstall build
# scripts this Astro + Cloudflare stack needs so `pnpm install` doesn't fail
# with ERR_PNPM_IGNORED_BUILDS in CI (where ignore-scripts isn't set).
allowBuilds:
  esbuild: true
  msw: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - '@saastro/studio'
  - '@astrojs/cloudflare@14.0.1'
  - astro@7.0.3
